providers:
  llm:
    # Jarvis uses LM Studio through its OpenAI-compatible local API.
    default: lm_studio
    base_url: http://127.0.0.1:1234/v1
    # Keep this as auto for LM Studio's local server fast path, or replace it
    # with the exact model id shown in LM Studio. Jarvis 0.0.5a also reads the
    # project-root .env file, so you can set JARVIS_LLM_MODEL or JARVIS_LM_MODEL
    # there without editing committed config.
    model: auto
    # False avoids the pre-chat /v1/models lookup. Set true only when you want
    # Jarvis to ask LM Studio which model is loaded before the first chat.
    resolve_auto_model: false
    # 0.0.5 streams tokens to clients that provide a stream callback, including
    # the CLI. Set false if you need to temporarily return to full-response mode.
    streaming: true
    # 0.0.5c request mode diagnostics. Keep openai for the known-compatible path,
    # or set native to use LM Studio's /api/v1/chat endpoint. Native mode can
    # send reasoning/thinking controls that match LM Studio's chat UI more closely.
    api_mode: openai
    native_base_url: http://127.0.0.1:1234
    # auto = omit the setting. off/low/medium/high/on are sent only in native mode.
    reasoning: auto
    # Optional native request context length override. Empty/default means LM Studio decides.
    context_length:
    # Keep false for now so diagnostic native requests do not create stored chats.
    store_native_chats: false
    timeout_seconds: 90
    temperature: 0.7
    max_tokens: 512
    # 0.0.5b speed diagnostics. These can also be set in the project-root .env.
    conversation_prompt_mode: normal
    benchmark_max_tokens: 64
    benchmark_prompt: Reply with exactly one short sentence saying you are ready.

    # 0.0.6 short-term conversation memory. This is a bounded rolling
    # session window, not permanent long-term memory. Keep it bounded because
    # Jarvis is intended to eventually run for long periods.
    memory_short_term_enabled: true
    memory_short_term_max_turns: 20
    memory_short_term_max_chars: 12000
    memory_short_term_inject_last_turns: 8
    memory_short_term_autosave: false

  ocr:
    default: mock

  tts:
    # 0.0.7 voice output foundation. XTTS is the preferred personal/local
    # provider for Tanner's current Jarvis voice experiments. Kokoro is the
    # SaaS-safer local fallback path. Mock keeps tests and fresh installs safe.
    default: xtts
    enabled: true
    fallback_providers: kokoro,mock
    output_dir: data/tts
    voice_name: jarvis
    language: en
    device: cuda
    use_gpu: true
    playback: false
    auto_speak: false
    xtts_model_name: tts_models/multilingual/multi-dataset/xtts_v2
    xtts_speaker_wav: assets/voices/jarvis_reference.wav
    kokoro_voice: af_heart
    kokoro_lang_code: a

  stt:
    default: mock

  avatar:
    default: mock_avatar
