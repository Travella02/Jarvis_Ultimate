ui:
  default_client: desktop
  theme: jarvis_dark
  density: comfortable
  desktop:
    enabled: true
    window_title: Jarvis Ultimate
    start_maximized: false
    auto_start_voice: true
    voice_start_mode: sleep_wake
    layout: three_column_workspace
    avatar_style: futuristic_orb
    event_feed_limit: 36
    workspace_cards_limit: 50
  panels:
    registry_enabled: true
    dynamic_open_events: true
    default_open:
      - avatar
      - status
      - chat
      - workspace
      - events

# 0.1.6b futuristic UI notes:
# The UI uses theme tokens + a drop-in panel registry so future agents can add
# panels/cards without rewriting the desktop shell.
# Jarvis Core must continue to run headless from CLI.
